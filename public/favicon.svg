<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" fill="#0f172a" rx="12"/>

  <!-- First (green bullish candle) -->
  <line x1="20" y1="10" x2="20" y2="50" stroke="#22c55e" stroke-width="3"/>
  <rect x="14" y="25" width="12" height="15" fill="#22c55e"/>

  <!-- Second (red bearish candle) -->
  <line x1="42" y1="12" x2="42" y2="52" stroke="#ef4444" stroke-width="3"/>
  <rect x="36" y="18" width="12" height="20" fill="#ef4444"/>
</svg>